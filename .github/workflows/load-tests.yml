name: Load Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  load-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-docker-${{ hashFiles('Dockerfile', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-docker-

      - name: Build app image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: mlh_pe_url_shortener-app:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Start services
        run: docker compose up -d --wait

      - name: Wait for healthy stack
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:80/health > /dev/null 2>&1; then
              echo "Stack is healthy"
              exit 0
            fi
            echo "Waiting for stack... ($i/30)"
            sleep 2
          done
          echo "Stack failed to become healthy"
          docker compose logs
          exit 1

      - name: Cache k6 binary
        id: k6-cache
        uses: actions/cache@v4
        with:
          path: /usr/bin/k6
          key: ${{ runner.os }}-k6-latest

      - name: Install k6
        if: steps.k6-cache.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Load test (500 VUs)
        run: k6 run --env SCENARIO=tier3 --env BASE_URL=http://localhost:80 loadtests/k6_test.js

      - name: Collect logs on failure
        if: failure()
        run: docker compose logs --tail=100
