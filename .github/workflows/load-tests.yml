name: Load Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read
  pull-requests: write

jobs:
  load-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-docker-${{ hashFiles('Dockerfile', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-docker-

      - name: Build app image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: mlh_pe_url_shortener-app:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Start services
        env:
          RESEND_API_KEY: ""
          ALERT_EMAIL_TO: ""
        run: docker compose up -d --wait

      - name: Wait for healthy stack
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:80/health > /dev/null 2>&1; then
              echo "Stack is healthy"
              exit 0
            fi
            echo "Waiting for stack... ($i/30)"
            sleep 2
          done
          echo "Stack failed to become healthy"
          docker compose logs
          exit 1

      - name: Cache k6 binary
        id: k6-cache
        uses: actions/cache@v4
        with:
          path: /usr/bin/k6
          key: ${{ runner.os }}-k6-latest

      - name: Install k6
        if: steps.k6-cache.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Load test (500 VUs)
        run: k6 run --env BASE_URL=http://localhost:80 --summary-export=k6-summary.json loadtests/stress.js 2>&1 | tee k6-output.txt

      - name: Verify infrastructure stack
        id: monitoring
        if: always()
        run: |
          echo "=== Infrastructure Stack Smoke Tests ==="
          RESULTS_FILE=$(mktemp)
          PASS=0; FAIL=0

          check() {
            local name="$1"; local result="$2"
            if [ "$result" = "true" ]; then
              echo "  PASS: $name"; PASS=$((PASS+1))
              echo "pass|$name" >> "$RESULTS_FILE"
            else
              echo "  FAIL: $name"; FAIL=$((FAIL+1))
              echo "fail|$name" >> "$RESULTS_FILE"
            fi
          }

          json_check() {
            python3 -c "$1" 2>/dev/null || echo "$2"
          }

          # ── 1. Nginx ──────────────────────────────────────────────
          echo ""
          echo "--- Nginx ---"

          HTTPS_STATUS=$(curl -kso /dev/null -w "%{http_code}" https://localhost:443/health 2>/dev/null || echo "000")
          check "HTTPS (TLS) endpoint responds" "$([ "$HTTPS_STATUS" = "200" ] && echo true || echo false)"

          HEADERS=$(curl -sI http://localhost:80/health 2>/dev/null || echo "")
          check "X-Frame-Options header" "$(echo "$HEADERS" | grep -qi 'X-Frame-Options' && echo true || echo false)"
          check "X-Content-Type-Options header" "$(echo "$HEADERS" | grep -qi 'X-Content-Type-Options' && echo true || echo false)"
          check "X-XSS-Protection header" "$(echo "$HEADERS" | grep -qi 'X-XSS-Protection' && echo true || echo false)"
          check "Referrer-Policy header" "$(echo "$HEADERS" | grep -qi 'Referrer-Policy' && echo true || echo false)"
          check "Permissions-Policy header" "$(echo "$HEADERS" | grep -qi 'Permissions-Policy' && echo true || echo false)"

          CORS_HEADERS=$(curl -sI -X OPTIONS http://localhost:80/urls 2>/dev/null || echo "")
          check "CORS Access-Control-Allow-Origin" "$(echo "$CORS_HEADERS" | grep -qi 'Access-Control-Allow-Origin' && echo true || echo false)"
          check "CORS Access-Control-Allow-Methods" "$(echo "$CORS_HEADERS" | grep -qi 'Access-Control-Allow-Methods' && echo true || echo false)"

          UPSTREAMS=""
          for i in $(seq 1 6); do
            ADDR=$(curl -sI http://localhost:80/health 2>/dev/null | grep -i 'X-Upstream' || \
                   curl -so /dev/null -w "%{remote_ip}" http://localhost:80/health 2>/dev/null || echo "")
            UPSTREAMS="$UPSTREAMS $ADDR"
          done
          REPLICA_COUNT=$(docker compose ps --format json 2>/dev/null | python3 -c "
          import sys,json
          lines=sys.stdin.read().strip().split('\n')
          count=sum(1 for l in lines if l.strip() for d in [json.loads(l)] if 'app' in d.get('Service','') and d.get('State')=='running')
          print(count)" 2>/dev/null || echo "0")
          check "Multiple app replicas running ($REPLICA_COUNT)" "$([ "$REPLICA_COUNT" -ge 2 ] && echo true || echo false)"

          # ── 2. Redis (caching) ────────────────────────────────────
          echo ""
          echo "--- Redis / Caching ---"

          REDIS_PING=$(docker compose exec -T redis redis-cli ping 2>/dev/null || echo "")
          check "Redis responds to PING" "$([ "$REDIS_PING" = "PONG" ] && echo true || echo false)"

          TEST_USER=$(curl -sf -X POST http://localhost:80/users \
            -H "Content-Type: application/json" \
            -d '{"username":"cache_test_'"$$"'","email":"cache_test_'"$$"'@test.local"}' 2>/dev/null || echo "{}")
          TEST_USER_ID=$(echo "$TEST_USER" | json_check "import sys,json; print(json.load(sys.stdin).get('id',''))" "")

          if [ -n "$TEST_USER_ID" ]; then
            TEST_URL=$(curl -sf -X POST http://localhost:80/urls \
              -H "Content-Type: application/json" \
              -d '{"user_id":'"$TEST_USER_ID"',"original_url":"https://example.com/cache-test-'"$$"'","title":"cache test"}' 2>/dev/null || echo "{}")
            TEST_URL_ID=$(echo "$TEST_URL" | json_check "import sys,json; print(json.load(sys.stdin).get('id',''))" "")

            if [ -n "$TEST_URL_ID" ]; then
              curl -sf http://localhost:80/urls/"$TEST_URL_ID" > /dev/null 2>&1
              sleep 0.5
              DBSIZE_BEFORE=$(docker compose exec -T redis redis-cli DBSIZE 2>/dev/null | grep -o '[0-9]*' || echo "0")
              check "Redis has cached entries ($DBSIZE_BEFORE keys)" "$([ "$DBSIZE_BEFORE" -ge 1 ] && echo true || echo false)"

              curl -sf http://localhost:80/urls/"$TEST_URL_ID" > /dev/null 2>&1
              DBSIZE_AFTER=$(docker compose exec -T redis redis-cli DBSIZE 2>/dev/null | grep -o '[0-9]*' || echo "0")
              check "Cache stable on repeated GET (no key explosion)" "$([ "$DBSIZE_AFTER" -le $((DBSIZE_BEFORE + 5)) ] && echo true || echo false)"
            else
              check "Redis cache entries (skipped - URL creation failed)" "false"
              check "Cache repeated GET (skipped)" "false"
            fi
          else
            check "Redis cache entries (skipped - user creation failed)" "false"
            check "Cache repeated GET (skipped)" "false"
          fi

          # ── 3. Jaeger (tracing) ───────────────────────────────────
          echo ""
          echo "--- Jaeger / Tracing ---"

          JAEGER_HEALTH=$(curl -sf http://localhost:16686/ -o /dev/null -w "%{http_code}" 2>/dev/null || echo "000")
          check "Jaeger UI accessible" "$([ "$JAEGER_HEALTH" = "200" ] && echo true || echo false)"

          JAEGER_SERVICES=$(curl -sf "http://localhost:16686/api/services" 2>/dev/null || echo "{}")
          HAS_SERVICE=$(echo "$JAEGER_SERVICES" | json_check "
          import sys,json
          data=json.load(sys.stdin)
          services=data.get('data',[])
          print('true' if 'url-shortener' in services else 'false')" "false")
          check "Jaeger has url-shortener service" "$HAS_SERVICE"

          JAEGER_TRACES=$(curl -sf "http://localhost:16686/api/traces?service=url-shortener&limit=5&lookback=1h" 2>/dev/null || echo "{}")
          TRACE_COUNT=$(echo "$JAEGER_TRACES" | json_check "
          import sys,json
          data=json.load(sys.stdin)
          print(len(data.get('data',[])))" "0")
          check "Traces flowing to Jaeger ($TRACE_COUNT found)" "$([ "$TRACE_COUNT" -ge 1 ] && echo true || echo false)"

          # ── 4. PostgreSQL (database) ──────────────────────────────
          echo ""
          echo "--- PostgreSQL ---"

          PG_READY=$(docker compose exec -T postgres pg_isready -U postgres 2>/dev/null | grep -c "accepting connections" || echo "0")
          check "PostgreSQL accepting connections" "$([ "$PG_READY" -ge 1 ] && echo true || echo false)"

          PG_CONN_COUNT=$(docker compose exec -T postgres psql -U postgres -d hackathon_db -tAc \
            "SELECT count(*) FROM pg_stat_activity WHERE datname='hackathon_db';" 2>/dev/null || echo "0")
          PG_CONN_COUNT=$(echo "$PG_CONN_COUNT" | tr -d '[:space:]')
          PG_MAX_CONN=$(docker compose exec -T postgres psql -U postgres -tAc "SHOW max_connections;" 2>/dev/null || echo "100")
          PG_MAX_CONN=$(echo "$PG_MAX_CONN" | tr -d '[:space:]')
          check "DB connections not exhausted ($PG_CONN_COUNT/$PG_MAX_CONN)" "$([ "$PG_CONN_COUNT" -lt "$PG_MAX_CONN" ] && echo true || echo false)"

          URL_COUNT=$(docker compose exec -T postgres psql -U postgres -d hackathon_db -tAc \
            "SELECT count(*) FROM urls;" 2>/dev/null || echo "0")
          URL_COUNT=$(echo "$URL_COUNT" | tr -d '[:space:]')
          check "URLs created during load test ($URL_COUNT rows)" "$([ "$URL_COUNT" -ge 1 ] && echo true || echo false)"

          USER_COUNT=$(docker compose exec -T postgres psql -U postgres -d hackathon_db -tAc \
            "SELECT count(*) FROM users;" 2>/dev/null || echo "0")
          USER_COUNT=$(echo "$USER_COUNT" | tr -d '[:space:]')
          check "Users created during load test ($USER_COUNT rows)" "$([ "$USER_COUNT" -ge 1 ] && echo true || echo false)"

          ORPHAN_URLS=$(docker compose exec -T postgres psql -U postgres -d hackathon_db -tAc \
            "SELECT count(*) FROM urls u LEFT JOIN users usr ON u.user_id=usr.id WHERE u.user_id IS NOT NULL AND usr.id IS NULL;" 2>/dev/null || echo "-1")
          ORPHAN_URLS=$(echo "$ORPHAN_URLS" | tr -d '[:space:]')
          check "No orphaned URL→User references ($ORPHAN_URLS)" "$([ "$ORPHAN_URLS" = "0" ] && echo true || echo false)"

          # ── 5. Prometheus ─────────────────────────────────────────
          echo ""
          echo "--- Prometheus ---"

          PROM_TARGETS=$(curl -sf http://localhost:9090/api/v1/targets 2>/dev/null || echo "{}")
          APP_UP=$(echo "$PROM_TARGETS" | json_check "
          import sys,json
          data=json.load(sys.stdin)
          targets=data.get('data',{}).get('activeTargets',[])
          print('true' if any(t.get('health')=='up' and 'app' in t.get('labels',{}).get('job','') for t in targets) else 'false')" "false")
          check "Prometheus scraping app target" "$APP_UP"

          FLASK_METRICS=$(curl -sf "http://localhost:9090/api/v1/query?query=flask_http_request_total" 2>/dev/null || echo "{}")
          HAS_FLASK=$(echo "$FLASK_METRICS" | json_check "
          import sys,json
          data=json.load(sys.stdin)
          print('true' if len(data.get('data',{}).get('result',[])) > 0 else 'false')" "false")
          check "Flask HTTP metrics in Prometheus" "$HAS_FLASK"

          LATENCY_METRIC=$(curl -sf "http://localhost:9090/api/v1/query?query=flask_http_request_duration_seconds_bucket" 2>/dev/null || echo "{}")
          HAS_LATENCY=$(echo "$LATENCY_METRIC" | json_check "
          import sys,json
          data=json.load(sys.stdin)
          print('true' if len(data.get('data',{}).get('result',[])) > 0 else 'false')" "false")
          check "Latency histogram buckets in Prometheus" "$HAS_LATENCY"

          # ── 6. Loki / Promtail ────────────────────────────────────
          echo ""
          echo "--- Loki / Promtail ---"

          LOKI_OK="false"
          for attempt in $(seq 1 6); do
            LOKI_READY_RESP=$(curl -sf http://localhost:3100/ready 2>/dev/null || echo "")
            if echo "$LOKI_READY_RESP" | grep -qi "ready"; then
              LOKI_OK="true"; break
            fi
            echo "  Waiting for Loki to be ready (attempt $attempt/6)..."
            sleep 5
          done
          check "Loki is ready" "$LOKI_OK"

          HAS_LOGS="false"
          if [ "$LOKI_OK" = "true" ]; then
            curl -sf http://localhost:80/health > /dev/null 2>&1 || true
            curl -sf http://localhost:80/health > /dev/null 2>&1 || true
            curl -sf http://localhost:80/health > /dev/null 2>&1 || true
            for attempt in $(seq 1 12); do
              LOKI_LOGS=$(curl -sf "http://localhost:3100/loki/api/v1/query?query=%7Bjob%3D%22app%22%7D&limit=5" 2>/dev/null || echo "{}")
              HAS_LOGS=$(echo "$LOKI_LOGS" | json_check "
          import sys,json
          data=json.load(sys.stdin)
          streams=data.get('data',{}).get('result',[])
          print('true' if len(streams) > 0 else 'false')" "false")
              if [ "$HAS_LOGS" = "true" ]; then break; fi
              echo "  Waiting for logs in Loki (attempt $attempt/12)..."
              sleep 5
            done
          fi
          check "App logs flowing to Loki" "$HAS_LOGS"

          # ── 7. Grafana ────────────────────────────────────────────
          echo ""
          echo "--- Grafana ---"
          GF_AUTH="admin:admin"

          GF_HEALTH=$(curl -sf http://localhost:3000/api/health 2>/dev/null || echo "{}")
          GF_OK=$(echo "$GF_HEALTH" | json_check "
          import sys,json
          data=json.load(sys.stdin)
          print('true' if data.get('database')=='ok' else 'false')" "false")
          check "Grafana is healthy" "$GF_OK"

          GF_DS=$(curl -sf -u "$GF_AUTH" http://localhost:3000/api/datasources 2>/dev/null || echo "[]")
          DS_COUNT=$(echo "$GF_DS" | json_check "import sys,json; print(len(json.load(sys.stdin)))" "0")
          check "Grafana datasources configured ($DS_COUNT)" "$([ "$DS_COUNT" -ge 1 ] && echo true || echo false)"

          GF_DASH=$(curl -sf -u "$GF_AUTH" "http://localhost:3000/api/search?type=dash-db" 2>/dev/null || echo "[]")
          DASH_COUNT=$(echo "$GF_DASH" | json_check "import sys,json; print(len(json.load(sys.stdin)))" "0")
          check "Grafana dashboards loaded ($DASH_COUNT)" "$([ "$DASH_COUNT" -ge 1 ] && echo true || echo false)"

          PROM_DS_ID=$(echo "$GF_DS" | json_check "
          import sys,json
          ds=json.load(sys.stdin)
          prom=[d for d in ds if d.get('type')=='prometheus']
          print(prom[0]['uid'] if prom else '')" "")
          if [ -n "$PROM_DS_ID" ]; then
            GF_PROM_QUERY=$(curl -sf -u "$GF_AUTH" \
              "http://localhost:3000/api/ds/query" \
              -H "Content-Type: application/json" \
              -d '{"queries":[{"refId":"A","datasourceId":1,"expr":"up","instant":true}],"from":"now-5m","to":"now"}' 2>/dev/null || echo "{}")
            GF_PROM_OK=$(echo "$GF_PROM_QUERY" | json_check "
          import sys,json
          data=json.load(sys.stdin)
          print('true' if 'results' in data else 'false')" "false")
            check "Grafana→Prometheus proxy query works" "$GF_PROM_OK"
          else
            check "Grafana→Prometheus proxy query (skipped - no datasource)" "false"
          fi

          # ── 8. Alertmanager ───────────────────────────────────────
          echo ""
          echo "--- Alertmanager ---"

          AM_STATUS=$(curl -sf http://localhost:9093/api/v2/status 2>/dev/null || echo "{}")
          AM_READY=$(echo "$AM_STATUS" | json_check "
          import sys,json
          data=json.load(sys.stdin)
          print('true' if data.get('cluster',{}).get('status')=='ready' else 'false')" "false")
          check "Alertmanager cluster is ready" "$AM_READY"

          AM_RECEIVERS=$(curl -sf http://localhost:9093/api/v2/receivers 2>/dev/null || echo "[]")
          RECV_NAMES=$(echo "$AM_RECEIVERS" | json_check "
          import sys,json
          data=json.load(sys.stdin)
          print(','.join(r.get('name','') for r in data))" "")
          check "Alertmanager receivers: $RECV_NAMES" "$([ -n "$RECV_NAMES" ] && echo true || echo false)"

          PROM_AM=$(curl -sf "http://localhost:9090/api/v1/alertmanagers" 2>/dev/null || echo "{}")
          AM_DISCOVERED=$(echo "$PROM_AM" | json_check "
          import sys,json
          data=json.load(sys.stdin)
          ams=data.get('data',{}).get('activeAlertmanagers',[])
          print('true' if len(ams) > 0 else 'false')" "false")
          check "Prometheus discovered Alertmanager" "$AM_DISCOVERED"

          # ── 9. Alert Rules ────────────────────────────────────────
          echo ""
          echo "--- Alert Rules ---"

          RULES=$(curl -sf http://localhost:9090/api/v1/rules 2>/dev/null || echo "{}")
          RULE_COUNT=$(echo "$RULES" | json_check "
          import sys,json
          data=json.load(sys.stdin)
          groups=data.get('data',{}).get('groups',[])
          rules=[r for g in groups for r in g.get('rules',[])]
          print(len(rules))" "0")
          check "Prometheus alert rules loaded ($RULE_COUNT)" "$([ "$RULE_COUNT" -ge 1 ] && echo true || echo false)"

          RULE_NAMES=$(echo "$RULES" | json_check "
          import sys,json
          data=json.load(sys.stdin)
          groups=data.get('data',{}).get('groups',[])
          names=[r['name'] for g in groups for r in g.get('rules',[]) if r.get('type')=='alerting']
          print(','.join(names))" "")
          for EXPECTED in ServiceDown HighErrorRate HighLatency RedisDown; do
            check "Alert rule '$EXPECTED' defined" "$(echo "$RULE_NAMES" | grep -q "$EXPECTED" && echo true || echo false)"
          done

          echo ""
          echo "=== Results: $PASS passed, $FAIL failed ==="

          {
            echo "monitoring_pass=$PASS"
            echo "monitoring_fail=$FAIL"
            echo "monitoring_results<<MONITORING_EOF"
            cat "$RESULTS_FILE"
            echo "MONITORING_EOF"
          } >> "$GITHUB_OUTPUT"

          rm -f "$RESULTS_FILE"

          if [ "$FAIL" -gt 0 ]; then
            echo "::warning::$FAIL infrastructure checks failed"
          fi

      - name: Post load test results to PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          MONITORING_PASS: ${{ steps.monitoring.outputs.monitoring_pass }}
          MONITORING_FAIL: ${{ steps.monitoring.outputs.monitoring_fail }}
          MONITORING_RESULTS: ${{ steps.monitoring.outputs.monitoring_results }}
        with:
          script: |
            const fs = require('fs');

            // --- k6 load test section ---
            let loadSection = '';
            try {
              const raw = fs.readFileSync('k6-summary.json', 'utf8');
              const data = JSON.parse(raw);
              const m = data.metrics;

              const fmt = (v) => v !== undefined ? v.toFixed(2) : 'N/A';
              const dur = m.http_req_duration || {};
              const reqs = m.http_reqs || {};
              const fails = m.http_req_failed || {};
              const iters = m.iterations || {};

              loadSection = [
                '## Load Test Results',
                '',
                '| Metric | Value |',
                '|--------|-------|',
                `| **Total Requests** | ${fmt(reqs.count)} |`,
                `| **Request Rate** | ${fmt(reqs.rate)} req/s |`,
                `| **Avg Response Time** | ${fmt(dur.avg)} ms |`,
                `| **p50 Response Time** | ${fmt(dur.med)} ms |`,
                `| **p90 Response Time** | ${fmt(dur['p(90)'])} ms |`,
                `| **p95 Response Time** | ${fmt(dur['p(95)'])} ms |`,
                `| **Max Response Time** | ${fmt(dur.max)} ms |`,
                `| **Error Rate** | ${fmt((fails.rate || 0) * 100)}% |`,
                `| **Total Iterations** | ${fmt(iters.count)} |`,
                '',
                '<details><summary>Full k6 output</summary>',
                '',
                '```',
                fs.readFileSync('k6-output.txt', 'utf8').slice(-3000),
                '```',
                '</details>',
              ].join('\n');
            } catch (e) {
              loadSection = [
                '## Load Test Results',
                '',
                '> Failed to parse k6 summary JSON.',
                '',
                '<details><summary>Full k6 output</summary>',
                '',
                '```',
                fs.existsSync('k6-output.txt') ? fs.readFileSync('k6-output.txt', 'utf8').slice(-3000) : 'No output captured.',
                '```',
                '</details>',
              ].join('\n');
            }

            // --- Monitoring stack section ---
            const monPass = parseInt(process.env.MONITORING_PASS || '0');
            const monFail = parseInt(process.env.MONITORING_FAIL || '0');
            const monTotal = monPass + monFail;
            const monResults = (process.env.MONITORING_RESULTS || '').trim();

            let monSection = '';
            if (monTotal > 0) {
              const icon = monFail === 0 ? '✅' : '⚠️';
              const headline = monFail === 0
                ? `${icon} All ${monTotal} checks passed`
                : `${icon} ${monPass}/${monTotal} checks passed (${monFail} failed)`;

              const rows = monResults.split('\n').filter(Boolean).map(line => {
                const [status, name] = line.split('|', 2);
                const emoji = status === 'pass' ? '✅' : '❌';
                return `| ${emoji} | ${name} |`;
              });

              monSection = [
                '',
                '---',
                '',
                '## Infrastructure Stack Verification',
                '',
                headline,
                '',
                '| Status | Check |',
                '|--------|-------|',
                ...rows,
              ].join('\n');
            }

            const summary = loadSection + monSection;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('## Load Test Results'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: summary,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: summary,
              });
            }

      - name: Upload k6 results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: |
            k6-summary.json
            k6-output.txt

      - name: Collect logs on failure
        if: failure()
        run: docker compose logs --tail=100
