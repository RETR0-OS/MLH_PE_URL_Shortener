name: Unit Tests

on:
  pull_request:
    branches: [main, dev]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hackathon_db_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 3

    env:
      DATABASE_NAME: hackathon_db_test
      DATABASE_HOST: localhost
      DATABASE_PORT: "5432"
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      REDIS_HOST: localhost
      REDIS_PORT: "6379"

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with: { enable-cache: true }

      - run: uv sync

      - name: Run tests with coverage
        run: uv run pytest --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=70 -v --junitxml=test-results.xml

      - name: Test Report
        if: always() && github.event_name == 'pull_request'
        uses: dorny/test-reporter@v1
        with:
          name: Test Results
          path: test-results.xml
          reporter: java-junit
          fail-on-empty: "false"

      - name: Post test results to PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let body = '## Unit Test Results\n\n';
            try {
              const xml = fs.readFileSync('test-results.xml', 'utf8');

              const attr = (tag, name) => {
                const m = tag.match(new RegExp(`${name}="([^"]*)"`));
                return m ? m[1] : '0';
              };

              const suiteMatch = xml.match(/<testsuite[^>]*>/g) || [];
              const root = suiteMatch[suiteMatch.length - 1] || '';
              const total = parseInt(attr(root, 'tests'));
              const failures = parseInt(attr(root, 'failures'));
              const errors = parseInt(attr(root, 'errors'));
              const skipped = parseInt(attr(root, 'skipped'));
              const passed = total - failures - errors - skipped;
              const time = parseFloat(attr(root, 'time')).toFixed(2);
              const ok = failures === 0 && errors === 0;

              let coveragePct = '';
              try {
                const covXml = fs.readFileSync('coverage.xml', 'utf8');
                const covMatch = covXml.match(/line-rate="([^"]*)"/);
                if (covMatch) coveragePct = (parseFloat(covMatch[1]) * 100).toFixed(0);
              } catch (_) {}

              body += ok ? '### All tests passed\n\n' : '### Some tests failed\n\n';
              body += '| Metric | Value |\n|--------|-------|\n';
              body += `| Passed | ${passed} |\n`;
              if (failures) body += `| Failed | ${failures} |\n`;
              if (errors) body += `| Errors | ${errors} |\n`;
              if (skipped) body += `| Skipped | ${skipped} |\n`;
              body += `| **Total** | **${total}** |\n`;
              body += `| Duration | ${time}s |\n`;
              if (coveragePct) body += `| Coverage | ${coveragePct}% |\n`;
              body += '\n';

              const caseRegex = /<testcase\s[^>]*?classname="([^"]*)"[^>]*?name="([^"]*)"[^>]*?(?:\/>|>([\s\S]*?)<\/testcase>)/g;
              const failedTests = [];
              const passedTests = [];
              let m;
              while ((m = caseRegex.exec(xml)) !== null) {
                const testName = `${m[1]}::${m[2]}`;
                const inner = m[3] || '';
                if (inner.includes('<failure') || inner.includes('<error')) {
                  const msgMatch = inner.match(/message="([^"]*)"/);
                  const msg = msgMatch ? msgMatch[1].split('\n')[0].slice(0, 120) : 'unknown';
                  failedTests.push({ name: testName, msg });
                } else {
                  passedTests.push(testName);
                }
              }

              if (failedTests.length) {
                body += '### Failed Tests\n\n';
                body += '| Test | Error |\n|------|-------|\n';
                for (const f of failedTests) {
                  body += `| \`${f.name}\` | ${f.msg} |\n`;
                }
                body += '\n';
              }

              body += '<details><summary>Passed Tests (' + passedTests.length + ')</summary>\n\n';
              for (const p of passedTests) {
                body += `- \`${p}\`\n`;
              }
              body += '\n</details>\n';
            } catch (e) {
              body += '> Could not parse test results: ' + e.message + '\n';
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('## Unit Test Results'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            test-results.xml
