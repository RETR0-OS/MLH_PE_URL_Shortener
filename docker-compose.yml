services:
  app:
    build: .
    expose:
      - "5000"
    environment:
      DATABASE_NAME: hackathon_db
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"
      OTEL_SERVICE_NAME: "url-shortener"
      API_KEY: ""
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      init-db:
        condition: service_completed_successfully
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        max_attempts: 5
        delay: 5s
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      resources:
        limits:
          cpus: "0.75"
          memory: 384M

  init-db:
    build: .
    command: python scripts/init_db.py
    environment:
      PYTHONPATH: /app
      DATABASE_NAME: hackathon_db
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
  
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hackathon_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    command: >
      postgres
      -c shared_buffers=192MB
      -c work_mem=8MB
      -c effective_cache_size=384MB
      -c maintenance_work_mem=64MB
      -c max_connections=100
      -c wal_buffers=16MB
      -c checkpoint_completion_target=0.9
      -c synchronous_commit=off
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768M

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 160M

  autoscaler:
    build: ./autoscaler
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      SERVICE_NAME: app
      MIN_REPLICAS: "2"
      MAX_REPLICAS: "5"
      SCALE_UP_THRESHOLD: "70.0"
      SCALE_DOWN_THRESHOLD: "30.0"
      CPU_LIMIT_CORES: "0.75"
      POLL_INTERVAL: "10"
      SCALE_UP_WINDOW: "2"
      SCALE_DOWN_WINDOW: "6"
      SCALE_UP_COOLDOWN: "60"
      SCALE_DOWN_COOLDOWN: "120"
    depends_on:
      - app
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M

  cert-gen:
    image: alpine
    volumes:
      - nginx_certs:/certs
    command:
      - sh
      - -c
      - |
        apk add --no-cache openssl
        if [ ! -f /certs/server.crt ]; then
          openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
            -keyout /certs/server.key \
            -out /certs/server.crt \
            -subj '/CN=localhost/O=URLShortener'
        fi
    restart: "no"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_certs:/etc/nginx/certs:ro
    depends_on:
      app:
        condition: service_started
      cert-gen:
        condition: service_completed_successfully
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M

  jaeger:
    image: jaegertracing/jaeger:2.16.0
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=72h"
      - "--storage.tsdb.path=/prometheus"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  alertmanager:
    image: prom/alertmanager:latest
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./monitoring/alertmanager/discord-receivers.yml:/etc/alertmanager/discord-receivers.yml:ro
      - ./monitoring/alertmanager/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/entrypoint.sh"]
    ports:
      - "9093:9093"
    environment:
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
      ALERT_EMAIL_TO: "${ALERT_EMAIL_TO:-contact.sahajpreetsingh@gmail.com}"
      DISCORD_WEBHOOK_URL: "${DISCORD_WEBHOOK_URL:-}"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  loki:
    image: grafana/loki:3.4.2
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3100/ready 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  promtail:
    image: grafana/promtail:latest
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  pgdata:
  prometheus_data:
  loki_data:
  grafana_data:
  nginx_certs:
