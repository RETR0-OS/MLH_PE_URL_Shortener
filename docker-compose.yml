services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: hackathon_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    command: postgres -c max_connections=103
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_NAME: hackathon_db
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      replicas: 2

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  autoscaler:
    build: ./autoscaler
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker-compose.yml:/autoscaler/docker-compose.yml:ro
    environment:
      COMPOSE_PROJECT_NAME: "${COMPOSE_PROJECT_NAME:-mlh_pe_url_shortener}"
      POLL_INTERVAL: "5"
      POLL_INTERVAL_HOT: "3"
      POLL_HOT_CPU: "50"
      COOLDOWN: "60"
      SCALE_UP_CPU: "70"
      SCALE_DOWN_CPU: "30"
      MIN_REPLICAS: "2"
      MAX_REPLICAS: "5"
    depends_on:
      app:
        condition: service_healthy
      nginx:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.05"

volumes:
  pgdata:
