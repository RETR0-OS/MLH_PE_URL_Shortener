<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} — {% endif %}MLH PE URL Shortener</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── Top nav ─────────────────────────────────────── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13, 17, 23, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #21262d;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-brand {
      font-size: 15px;
      font-weight: 700;
      color: #e6edf3;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-brand .dot { color: #58a6ff; }
    .nav-links { display: flex; gap: 4px; }
    .nav-links a {
      font-size: 13px;
      font-weight: 500;
      color: #8b949e;
      text-decoration: none;
      padding: 6px 12px;
      border-radius: 6px;
      transition: color .15s, background .15s;
    }
    .nav-links a:hover { color: #e6edf3; background: #161b22; }

    /* ── Page wrapper ────────────────────────────────── */
    .page-wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* ── Breadcrumb ──────────────────────────────────── */
    .breadcrumb {
      font-size: 12px;
      color: #8b949e;
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .breadcrumb a { color: #58a6ff; text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }
    .breadcrumb .sep { color: #30363d; }

    /* ── Content typography ──────────────────────────── */
    .content h1 {
      font-size: clamp(22px, 4vw, 32px);
      font-weight: 700;
      letter-spacing: -.02em;
      line-height: 1.2;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid #21262d;
    }
    .content h2 {
      font-size: 20px;
      font-weight: 700;
      margin-top: 48px;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid #21262d;
      color: #e6edf3;
    }
    .content h3 {
      font-size: 16px;
      font-weight: 700;
      margin-top: 32px;
      margin-bottom: 12px;
      color: #e6edf3;
    }
    .content h4 {
      font-size: 14px;
      font-weight: 700;
      margin-top: 24px;
      margin-bottom: 8px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .content p {
      margin-bottom: 16px;
      color: #c9d1d9;
      font-size: 15px;
    }
    .content a { color: #58a6ff; text-decoration: none; }
    .content a:hover { text-decoration: underline; }

    .content ul, .content ol {
      padding-left: 24px;
      margin-bottom: 16px;
    }
    .content li {
      font-size: 15px;
      color: #c9d1d9;
      margin-bottom: 6px;
    }

    /* ── Code ────────────────────────────────────────── */
    .content code {
      font-family: "SF Mono", "Fira Code", Consolas, monospace;
      font-size: 13px;
      background: #161b22;
      color: #f0883e;
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid #21262d;
    }
    .content pre {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 10px;
      padding: 20px;
      overflow-x: auto;
      margin: 16px 0 24px;
    }
    .content pre code {
      background: none;
      border: none;
      color: #e6edf3;
      font-size: 13px;
      padding: 0;
    }

    /* ── Tables ──────────────────────────────────────── */
    .content table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0 24px;
      font-size: 14px;
    }
    .content th {
      background: #161b22;
      color: #8b949e;
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .06em;
      padding: 10px 14px;
      text-align: left;
      border-bottom: 1px solid #21262d;
    }
    .content td {
      padding: 11px 14px;
      border-bottom: 1px solid #161b22;
      color: #c9d1d9;
      vertical-align: top;
    }
    .content tr:last-child td { border-bottom: none; }
    .content tr:hover td { background: #161b22; }

    /* ── Blockquote ──────────────────────────────────── */
    .content blockquote {
      border-left: 3px solid #58a6ff;
      padding: 12px 16px;
      background: #161b22;
      border-radius: 0 8px 8px 0;
      margin: 16px 0 24px;
    }
    .content blockquote p { color: #8b949e; margin: 0; font-size: 14px; }

    /* ── Images ──────────────────────────────────────── */
    .content img {
      max-width: 100%;
      border-radius: 10px;
      border: 1px solid #21262d;
      margin: 16px 0;
    }

    /* ── HR ──────────────────────────────────────────── */
    .content hr {
      border: none;
      border-top: 1px solid #21262d;
      margin: 40px 0;
    }

    /* ── Footer ──────────────────────────────────────── */
    footer {
      border-top: 1px solid #21262d;
      padding: 24px;
      text-align: center;
      font-size: 12px;
      color: #484f58;
    }
    footer a { color: #58a6ff; text-decoration: none; }
  </style>
</head>
<body>

  <nav>
    <a class="nav-brand" href="{{ site.baseurl }}/">
      <span>URL Shortener</span><span class="dot"> ·</span><span style="color:#8b949e;font-weight:400">MLH PE</span>
    </a>
    <div class="nav-links">
      <a href="/MLH_PE_URL_Shortener/Reliability/RELIABILITY_ENGINEERING">🛡️ Reliability</a>
      <a href="/MLH_PE_URL_Shortener/TRACK2_SCALABILITY_ENGINEERING">🚀 Scalability</a>
      <a href="/MLH_PE_URL_Shortener/TRACK3_INCIDENT_RESPONSE">🚨 Incident Response</a>
      <a href="/MLH_PE_URL_Shortener/TRACK4_DOCUMENTATION">📜 Docs</a>
      <a href="/MLH_PE_URL_Shortener/api">📄 API</a>
      <a href="https://github.com/RETR0-OS/MLH_PE_URL_Shortener" target="_blank">GitHub ↗</a>
    </div>
  </nav>

  <div class="page-wrap">
    {% if page.url != "/" and page.url != "/index.html" %}
    <div class="breadcrumb">
      <a href="{{ site.baseurl }}/">Home</a>
      <span class="sep">/</span>
      <span>{{ page.title | default: page.name }}</span>
    </div>
    {% endif %}

    <div class="content">
      {{ content }}
    </div>
  </div>

  <footer>
    Built for the <a href="https://mlh.io" target="_blank">MLH</a> Production Engineering Hackathon ·
    <a href="https://github.com/RETR0-OS/MLH_PE_URL_Shortener" target="_blank">GitHub</a>
  </footer>

</body>
</html>
