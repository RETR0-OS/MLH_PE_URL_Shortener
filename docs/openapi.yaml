openapi: "3.0.3"
info:
  title: MLH PE URL Shortener API
  description: |
    API specification for the MLH Production Engineering URL Shortener hackathon project.
    Covers Health, Users, URLs, and Events/Analytics endpoints as defined by the automated submission tests.
  version: "1.0.0"
  contact:
    name: MLH PE Hackathon Team

servers:
  - url: http://localhost:5000
    description: Local Flask dev server

tags:
  - name: Health
    description: Liveness probe
  - name: Users
    description: User management (CRUD + bulk CSV import)
  - name: URLs
    description: Shortened URL management
  - name: Events
    description: Analytics and event tracking

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      description: Returns 200 OK when the API is running and ready to accept requests.
      operationId: healthCheck
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok

  /users:
    get:
      tags: [Users]
      summary: List users
      description: Returns a JSON array of all users. Supports optional pagination via query params.
      operationId: listUsers
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 20
          description: Items per page
      responses:
        "200":
          description: A list of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
              example:
                - id: 1
                  username: silvertrail15
                  email: silvertrail15@hackstack.io
                  created_at: "2025-09-19T22:25:05"
                - id: 2
                  username: urbancanyon36
                  email: urbancanyon36@opswise.net
                  created_at: "2024-04-09T02:51:03"

    post:
      tags: [Users]
      summary: Create user
      description: |
        Creates a new user. Returns 201 on success.
        Rejects invalid data schemas (e.g. integer for username) with 400 or 422.
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
            example:
              username: testuser
              email: testuser@example.com
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
              example:
                id: 3
                username: testuser
                email: testuser@example.com
                created_at: "2026-04-03T12:00:00"
        "400":
          description: Bad request — invalid data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Unprocessable entity — validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/bulk:
    post:
      tags: [Users]
      summary: Bulk load users (CSV import)
      description: |
        Accepts a multipart/form-data upload with a `file` field containing a CSV of users.
        Returns the count of imported users.
      operationId: bulkLoadUsers
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: CSV file containing user records
      responses:
        "200":
          description: Users imported successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkImportResponse"
              examples:
                count_format:
                  summary: Count format
                  value:
                    count: 2
                imported_format:
                  summary: Imported format
                  value:
                    imported: 2
        "201":
          description: Users imported successfully (alternative status)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkImportResponse"

  /users/{id}:
    get:
      tags: [Users]
      summary: Get user by ID
      operationId: getUserById
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: A single user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
              example:
                id: 1
                username: silvertrail15
                email: silvertrail15@hackstack.io
                created_at: "2025-09-19T22:25:05"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      tags: [Users]
      summary: Update user
      operationId: updateUser
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
            example:
              username: updated_username
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
              example:
                id: 1
                username: updated_username
                email: silvertrail15@hackstack.io
                created_at: "2025-09-19T22:25:05"
        "400":
          description: Bad request — invalid data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /urls:
    get:
      tags: [URLs]
      summary: List URLs
      description: Returns all shortened URLs. Supports filtering by user_id.
      operationId: listUrls
      parameters:
        - name: user_id
          in: query
          required: false
          schema:
            type: integer
          description: Filter URLs by owner user ID
      responses:
        "200":
          description: A list of URL objects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Url"
              example:
                - id: 1
                  user_id: 1
                  short_code: ALQRog
                  original_url: "https://opswise.net/harbor/journey/1"
                  title: Service guide lagoon
                  is_active: true
                  created_at: "2025-06-04T00:07:00"
                  updated_at: "2025-11-19T03:17:29"

    post:
      tags: [URLs]
      summary: Create URL
      description: |
        Creates a new shortened URL with a generated short_code.
        Handles missing user gracefully and rejects invalid constraints.
      operationId: createUrl
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUrlRequest"
            example:
              user_id: 1
              original_url: "https://example.com/test"
              title: Test URL
      responses:
        "201":
          description: URL created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Url"
              example:
                id: 3
                user_id: 1
                short_code: k8Jd9s
                original_url: "https://example.com/test"
                title: Test URL
                is_active: true
                created_at: "2026-04-03T12:00:00"
                updated_at: "2026-04-03T12:00:00"
        "400":
          description: Bad request — invalid input or missing user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Unprocessable entity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /urls/{id}:
    get:
      tags: [URLs]
      summary: Get URL by ID
      operationId: getUrlById
      parameters:
        - $ref: "#/components/parameters/UrlId"
      responses:
        "200":
          description: A single URL object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Url"
              example:
                id: 1
                user_id: 1
                short_code: ALQRog
                original_url: "https://opswise.net/harbor/journey/1"
                title: Service guide lagoon
                is_active: true
                created_at: "2025-06-04T00:07:00"
                updated_at: "2025-11-19T03:17:29"
        "404":
          description: URL not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      tags: [URLs]
      summary: Update URL details
      operationId: updateUrl
      parameters:
        - $ref: "#/components/parameters/UrlId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUrlRequest"
            example:
              title: Updated Title
              is_active: false
      responses:
        "200":
          description: URL updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Url"
              example:
                id: 1
                user_id: 1
                short_code: ALQRog
                original_url: "https://opswise.net/harbor/journey/1"
                title: Updated Title
                is_active: false
                created_at: "2025-06-04T00:07:00"
                updated_at: "2026-04-03T12:00:00"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: URL not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /events:
    get:
      tags: [Events]
      summary: List events
      description: Returns all analytics/tracking events.
      operationId: listEvents
      responses:
        "200":
          description: A list of event objects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
              example:
                - id: 1
                  url_id: 1
                  user_id: 1
                  event_type: created
                  timestamp: "2025-06-04T00:07:00"
                  details:
                    short_code: ALQRog
                    original_url: "https://opswise.net/harbor/journey/1"

components:
  parameters:
    UserId:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: User ID
    UrlId:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: URL ID

  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok

    User:
      type: object
      required: [id, username, email, created_at]
      properties:
        id:
          type: integer
          example: 1
        username:
          type: string
          example: silvertrail15
        email:
          type: string
          format: email
          example: silvertrail15@hackstack.io
        created_at:
          type: string
          format: date-time
          example: "2025-09-19T22:25:05"

    CreateUserRequest:
      type: object
      required: [username, email]
      properties:
        username:
          type: string
          example: testuser
        email:
          type: string
          format: email
          example: testuser@example.com

    UpdateUserRequest:
      type: object
      properties:
        username:
          type: string
          example: updated_username
        email:
          type: string
          format: email

    BulkImportResponse:
      type: object
      properties:
        count:
          type: integer
          example: 2
        imported:
          type: integer
          example: 2

    Url:
      type: object
      required: [id, user_id, short_code, original_url, title, is_active, created_at, updated_at]
      properties:
        id:
          type: integer
          example: 1
        user_id:
          type: integer
          example: 1
        short_code:
          type: string
          example: ALQRog
        original_url:
          type: string
          format: uri
          example: "https://opswise.net/harbor/journey/1"
        title:
          type: string
          example: Service guide lagoon
        is_active:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
          example: "2025-06-04T00:07:00"
        updated_at:
          type: string
          format: date-time
          example: "2025-11-19T03:17:29"

    CreateUrlRequest:
      type: object
      required: [user_id, original_url, title]
      properties:
        user_id:
          type: integer
          example: 1
        original_url:
          type: string
          format: uri
          example: "https://example.com/test"
        title:
          type: string
          example: Test URL

    UpdateUrlRequest:
      type: object
      properties:
        title:
          type: string
          example: Updated Title
        is_active:
          type: boolean
          example: false

    Event:
      type: object
      required: [id, url_id, user_id, event_type, timestamp, details]
      properties:
        id:
          type: integer
          example: 1
        url_id:
          type: integer
          example: 1
        user_id:
          type: integer
          example: 1
        event_type:
          type: string
          example: created
        timestamp:
          type: string
          format: date-time
          example: "2025-06-04T00:07:00"
        details:
          type: object
          properties:
            short_code:
              type: string
              example: ALQRog
            original_url:
              type: string
              format: uri
              example: "https://opswise.net/harbor/journey/1"

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Invalid input data
        details:
          type: object
