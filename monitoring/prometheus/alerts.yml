groups:
  - name: app_alerts
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "App instance {{ $labels.instance }} is down"
          description: "{{ $labels.instance }} has been unreachable for more than 1 minute."

      - alert: HighErrorRate
        expr: >
          (rate(flask_http_request_total{status=~"5.."}[2m])
          / rate(flask_http_request_total[2m])) > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx error rate on {{ $labels.instance }}"
          description: "Error rate is above 10% for the last 2 minutes."

      - alert: HighLatency
        expr: >
          histogram_quantile(0.95, rate(flask_http_request_duration_seconds_bucket[5m])) > 3
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High p95 latency on {{ $labels.instance }}"
          description: "95th percentile latency exceeds 3 seconds."

      - alert: RedisDown
        expr: increase(redis_connection_errors_total[1m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Redis connection errors detected"
          description: "Redis connection errors have been increasing for 1 minute."
