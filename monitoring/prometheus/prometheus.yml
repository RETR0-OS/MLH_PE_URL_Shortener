global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "app"
    dns_sd_configs:
      - names: ["app"]
        type: A
        port: 5000
    metrics_path: /metrics
    scrape_interval: 15s
